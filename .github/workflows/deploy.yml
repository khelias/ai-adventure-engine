name: Deploy to Homelab

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, linux, homelab]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality gate and build
        run: |
          if [ -f /home/khe/homelab/services/apps/games/.env ]; then
            set -a
            . /home/khe/homelab/services/apps/games/.env
            set +a
            export VITE_API_SECRET="${API_SECRET:-}"
          fi
          npm run lint
          npm run build
          npm run test:unit
          npm run ui:smoke
          npm run schema:hashes
          node --check proxy/server.js

      - name: Deploy frontend
        run: |
          mkdir -p /srv/data/games/adventure/app
          rm -rf /srv/data/games/adventure/app/*
          cp -r dist/* /srv/data/games/adventure/app/
          echo "Frontend deployed at $(date)"

      # Build the proxy image locally on the VM. The khe-homelab compose
      # references `games-adventure-proxy:latest` without a build context, so
      # the tag is set here and the container is recreated against the fresh
      # image in the next step.
      - name: Build proxy image
        run: docker build -t games-adventure-proxy:latest ./proxy

      - name: Restart proxy container
        run: cd /home/khe/homelab/services/apps/games && docker compose up -d --force-recreate adventure-proxy
