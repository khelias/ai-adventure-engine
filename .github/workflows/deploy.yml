name: Deploy to Homelab

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, linux, homelab]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        run: |
          mkdir -p /srv/data/games/adventure/app
          rm -rf /srv/data/games/adventure/app/*
          cp -r dist/* /srv/data/games/adventure/app/
          echo "Deployed at $(date)"
